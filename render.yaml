services:
  - type: web
    name: connectyou
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: "sqlite:///instance/contacts.db"
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: FB_VERIFY_TOKEN
        sync: false
