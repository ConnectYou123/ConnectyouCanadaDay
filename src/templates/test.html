<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Test Page</h1>
        
        <!-- Document Analyzer (Drag & Drop) -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card bg-dark text-light">
                    <div class="card-header">
                        <h5>Document Analyzer (PDF / DOCX / TXT)</h5>
                    </div>
                    <div class="card-body">
                        <div id="dropZone" style="border: 2px dashed #ccc; padding: 2rem; text-align: center; cursor: pointer;">
                            <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
                            <div>Drop your document here, or click to choose a file</div>
                        </div>
                        <input id="dropFileInput" type="file" accept=".pdf,.docx,.txt" hidden />
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
